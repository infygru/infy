# ============================================================
#  Nginx — Reverse Proxy for Infygru (Next.js on port 3000)
#  Place this file at: /etc/nginx/sites-available/infygru
#  Then run: sudo ln -s /etc/nginx/sites-available/infygru /etc/nginx/sites-enabled/
#  Reload: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name infygru.com www.infygru.com;

    # Redirect all HTTP → HTTPS (enable after SSL is set up with certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (required for Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Serve Next.js static files directly via Nginx (faster than proxying)
    location /_next/static/ {
        alias /var/www/infygru/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Serve public folder assets directly
    location /public/ {
        alias /var/www/infygru/public/;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}

