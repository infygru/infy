# ============================================================
#  Nixpacks build configuration for Coolify
# ============================================================

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Use npm install --include=optional so platform-specific binaries
# (lightningcss-linux-x64-gnu, @tailwindcss/oxide-linux-x64-gnu) are installed.
# npm ci would skip optional deps if .npmrc had omit=optional previously.
cmds = ["npm install --include=optional --prefer-offline"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
