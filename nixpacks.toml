# ============================================================
#  Nixpacks build configuration for Coolify
#  Docs: https://nixpacks.com/docs/configuration/file
# ============================================================

[phases.setup]
nixPkgs = ["nodejs_20"]  # Pin Node.js 20 LTS

[phases.install]
cmds = ["npm ci"]        # Faster, deterministic install vs npm install

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"   # Disable Next.js telemetry in build
